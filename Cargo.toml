[workspace]
resolver = "2"
members = [
    "crates/elidex-plugin",
    "crates/elidex-plugin-macros",
    "crates/elidex-ecs",
    "crates/elidex-crawler",
    "crates/elidex-parser",
    "crates/elidex-css",
    "crates/elidex-style",
    "crates/elidex-layout-block",
    "crates/elidex-layout-flex",
    "crates/elidex-layout-grid",
    "crates/elidex-layout-table",
    "crates/elidex-layout",
    "crates/elidex-shaping",
    "crates/elidex-linebreak",
    "crates/elidex-bidi",
    "crates/elidex-text",
    "crates/elidex-render",
    "crates/elidex-shell",
    "crates/elidex-script-session",
    "crates/elidex-net",
    "crates/elidex-dom-api",
    "crates/elidex-dom-compat",
    "crates/elidex-js-boa",
    "crates/elidex-js",
    "crates/elidex-navigation",
    "crates/elidex-api-canvas",
    "crates/elidex-a11y",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/send-sh/elidex"
authors = ["send.sh"]
rust-version = "1.88"
publish = false

[workspace.dependencies]
anyhow = "1"
cssparser = "0.34"
encoding_rs = "0.8"
clap = { version = "4", features = ["derive"] }
csv = "1"
hecs = "0.10"
html5ever = "0.38"
markup5ever_rcdom = "0.38"
reqwest = { version = "0.12", features = ["gzip", "brotli"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "macros", "net", "io-util", "fs"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"
fontdb = "0.23"
rustybuzz = "0.20"
bytes = "1"
cookie = "0.18"
http = "1"
http-body-util = "0.1"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp"] }
hyper = { version = "1", features = ["client", "http1", "http2"] }
hyper-util = { version = "0.1", features = ["tokio"] }
rustls = { version = "0.23", default-features = false, features = ["std", "tls12", "ring"] }
rustls-pki-types = "1"
tokio-rustls = "0.26"
url = "2"
webpki-roots = "0.26"
elidex-net = { path = "crates/elidex-net" }
elidex-plugin = { path = "crates/elidex-plugin" }
elidex-ecs = { path = "crates/elidex-ecs" }
elidex-css = { path = "crates/elidex-css" }
elidex-text = { path = "crates/elidex-text" }
elidex-style = { path = "crates/elidex-style" }
elidex-parser = { path = "crates/elidex-parser" }
elidex-layout-block = { path = "crates/elidex-layout-block" }
elidex-layout-flex = { path = "crates/elidex-layout-flex" }
elidex-layout-grid = { path = "crates/elidex-layout-grid" }
elidex-layout-table = { path = "crates/elidex-layout-table" }
elidex-layout = { path = "crates/elidex-layout" }
elidex-render = { path = "crates/elidex-render" }
elidex-shell = { path = "crates/elidex-shell" }
elidex-script-session = { path = "crates/elidex-script-session" }
elidex-dom-api = { path = "crates/elidex-dom-api" }
elidex-dom-compat = { path = "crates/elidex-dom-compat" }
elidex-js-boa = { path = "crates/elidex-js-boa" }
elidex-js = { path = "crates/elidex-js" }
elidex-navigation = { path = "crates/elidex-navigation" }
elidex-api-canvas = { path = "crates/elidex-api-canvas" }
elidex-a11y = { path = "crates/elidex-a11y" }
boa_engine = { version = "0.20", features = ["annex-b"] }
boa_gc = "0.20"
egui = "0.33"
egui-wgpu = "0.33"
egui-winit = "0.33"
vello = "0.7"
wgpu = "27"
winit = "0.30"
pollster = "0.4"
tiny-skia = "0.11"
accesskit = "0.24"
accesskit_winit = "0.32"

[profile.release]
lto = true
codegen-units = 1

[workspace.lints.rust]
unsafe_code = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# Allow assert_eq! on f32 in tests (exact values from deterministic computations)
float_cmp = "allow"
# Allow common patterns
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
