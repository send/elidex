[workspace]
resolver = "2"
members = [
    "crates/elidex-plugin",
    "crates/elidex-plugin-macros",
    "crates/elidex-ecs",
    "crates/elidex-crawler",
    "crates/elidex-parser",
    "crates/elidex-css",
    "crates/elidex-style",
    "crates/elidex-layout",
    "crates/elidex-text",
    "crates/elidex-render",
    "crates/elidex-shell",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/send-sh/elidex"
authors = ["send.sh"]
rust-version = "1.88"
publish = false

[workspace.dependencies]
anyhow = "1"
cssparser = "0.34"
clap = { version = "4", features = ["derive"] }
csv = "1"
hecs = "0.10"
html5ever = "0.38"
markup5ever_rcdom = "0.38"
reqwest = { version = "0.12", features = ["gzip", "brotli"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "macros"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"
fontdb = "0.23"
rustybuzz = "0.20"
elidex-plugin = { path = "crates/elidex-plugin" }
elidex-ecs = { path = "crates/elidex-ecs" }
elidex-css = { path = "crates/elidex-css" }
elidex-text = { path = "crates/elidex-text" }
elidex-style = { path = "crates/elidex-style" }
elidex-parser = { path = "crates/elidex-parser" }
elidex-layout = { path = "crates/elidex-layout" }
elidex-render = { path = "crates/elidex-render" }
elidex-shell = { path = "crates/elidex-shell" }
vello = "0.7"
wgpu = "27"
winit = "0.30"
pollster = "0.4"

[profile.release]
lto = true
codegen-units = 1

[workspace.lints.rust]
unsafe_code = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# Allow assert_eq! on f32 in tests (exact values from deterministic computations)
float_cmp = "allow"
# Allow common patterns
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
