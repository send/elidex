rusqlite = { version = "0.40", features = ["bundled"] }
egui = "0.34"
egui-wgpu = "0.35"
egui-winit = "0.34"
vello = "0.9"
wgpu = "30"
winit = "0.30"
pollster = "1.0"
tiny-skia = "0.12"
accesskit = "0.24"
accesskit_winit = "0.33"
wasmtime = "46"
wat = "1"
static_assertions = "1"
rayon = "1"
unicode-segmentation = "1"
unicode-linebreak = "0.1"
regex = "1"
