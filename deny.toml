[advisories]
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # RUSTSEC-2023-0071 — "Marvin Attack": a timing sidechannel in the `rsa`
    # crate's RSA private-key operations (classically the PKCS#1 v1.5 / OAEP
    # **decryption** unpadding oracle).  There is no patched `rsa` release (the
    # fix is pending upstream, RustCrypto/RSA#626) and no alternative mature
    # pure-Rust RSA crate with key generation (`ring` has no RSA keygen), so the
    # advisory is unavoidable for any RSA support — and `cargo-deny`'s `ignore`
    # is per-advisory-ID (global), with no per-call-path scoping.
    #
    # Why this is acceptable for PR-5a (#11-crypto-subtle-full, RSA signing):
    #   - The Marvin DECRYPTION oracle is absent: PR-5a adds no RSA decryption
    #     (RSA-OAEP `decrypt`/`unwrapKey` is the follow-on PR-5b).
    #   - The RSA SIGNING path IS mitigated, not merely "avoided": `rsa::sign`
    #     uses `sign_with_rng` (`crypto::rsa::sign`), the crate's own blinding of
    #     the private-key exponentiation — the documented mitigation for
    #     timing-observable signing (RustCrypto/RSA `sign_with_rng` docs).
    #   - keygen / import / export are not timing-oracle surfaces.
    #
    # MANDATORY RE-EVALUATION at PR-5b (RSA-OAEP `decrypt`/`unwrapKey`) — the
    # path the Marvin attack actually targets: that PR MUST gate on either a
    # fixed `rsa` release (drop this ignore) or an explicit, security-reviewed
    # acceptance of the decryption timing risk under the WebCrypto threat model.
    # Do NOT let PR-5b inherit this ignore silently.
    "RUSTSEC-2023-0071",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
    "0BSD",
    "BSL-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = []
