[advisories]
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # wasmtime 29 advisories — all WASI/sandbox related, not exploitable in elidex
    # (we don't use WASI or shared memory). Upgrade to wasmtime >=36.0.6 in Phase 4.
    { id = "RUSTSEC-2025-0046", reason = "WASIp1 fd_renumber panic — WASI not used in elidex" },
    { id = "RUSTSEC-2025-0118", reason = "shared linear memory unsoundness — shared memory not used in elidex" },
    { id = "RUSTSEC-2026-0006", reason = "f64.copysign sandbox escape — Wasm modules are trusted in elidex Phase 3.5" },
    { id = "RUSTSEC-2026-0020", reason = "WASI resource exhaustion — WASI not used in elidex" },
    { id = "RUSTSEC-2026-0021", reason = "wasi:http/types.fields panic — WASI not used in elidex" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
    "0BSD",
    "BSL-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = []
