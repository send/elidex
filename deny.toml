[advisories]
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # wasmtime 29 advisories — all WASI/sandbox related, not exploitable in elidex
    # (we don't use WASI or shared memory). Upgrade to wasmtime >=36.0.6 in Phase 4.
    { id = "RUSTSEC-2025-0046", reason = "WASIp1 fd_renumber panic — WASI not used in elidex" },
    { id = "RUSTSEC-2025-0118", reason = "shared linear memory unsoundness — shared memory not used in elidex" },
    { id = "RUSTSEC-2026-0006", reason = "f64.copysign sandbox escape — Wasm modules are trusted in elidex Phase 3.5" },
    { id = "RUSTSEC-2026-0020", reason = "WASI resource exhaustion — WASI not used in elidex" },
    { id = "RUSTSEC-2026-0021", reason = "wasi:http/types.fields panic — WASI not used in elidex" },
    # thin-vec v0.2.14 UAF triggers only when an element's Drop impl panics.
    # Sole consumer is boa_engine (transitive: boa_gc / boa_ast / boa_parser /
    # boa_interner), which is slated for removal in M4-12 PR7 (boa→VM cutover
    # complete).  Boa stores its own GcRefCell-wrapped values whose Drop is
    # infallible, so the panic precondition for the UAF is unreachable in
    # our actual usage.
    #
    # Tracking: added in PR #86 (M4-12 PR5a-fetch); removed in the same
    # commit that drops the last `boa_*` dependency (M4-12 PR7).  To
    # validate the removal is complete, run:
    #     cargo tree --workspace --edges normal -i thin-vec
    # after the boa cutover lands — the command must print an error
    # (`package ID specification ... did not match any packages`), which
    # confirms thin-vec is no longer in the resolved dependency graph.
    # If thin-vec is still pulled in (e.g. via a new transitive dep), do
    # **not** re-add this ignore without a fresh analysis of its Drop
    # preconditions in that caller.
    { id = "RUSTSEC-2026-0103", reason = "thin-vec UAF — only via boa (removed in M4-12 PR7, tracked in PR #86); boa's stored values never panic in Drop" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
    "0BSD",
    "BSL-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = []
