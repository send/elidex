[package]
name = "elidex-net"
description = "HTTP network stack for elidex browser engine"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
readme = "README.md"
keywords = ["browser-engine", "network", "http"]
categories = ["web-programming"]

[dependencies]
bytes.workspace = true
cookie.workspace = true
elidex-plugin.workspace = true
futures-util.workspace = true
http.workspace = true
http-body-util.workspace = true
hyper.workspace = true
psl.workspace = true
hyper-util.workspace = true
rustls.workspace = true
rustls-pki-types.workspace = true
tokio.workspace = true
tokio-rustls.workspace = true
tokio-tungstenite.workspace = true
crossbeam-channel.workspace = true
tracing.workspace = true
url.workspace = true
webpki-roots.workspace = true

[features]
# Exposes `NetworkHandle::mock_with_responses` + a mock-aware branch
# in `fetch_blocking` so downstream crates (currently `elidex-js`)
# can drive the fetch surface from unit tests without a live
# broker.  Not enabled in production builds.
test-hooks = []

[dev-dependencies]
# `tokio::time::pause` / `start_paused = true` for the WS / SSE
# timeout-arm regression tests (slot #10.6a Copilot R5 HX24/HX25).
# Pulled in only as a dev-dep so production builds don't ship the
# extra `test-util` runtime support.
tokio = { workspace = true, features = ["test-util"] }

[lints]
workspace = true
