[package]
name = "elidex-storage-core"
description = "Storage backend abstraction for elidex (Ch.22 StorageBackend)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
keywords = ["browser-engine", "storage", "sqlite"]
categories = ["web-programming"]

[lints]
workspace = true

[features]
# The synchronous Web Storage backend (`WebStorageManager` / `SessionStorageState`)
# backing the legacy `localStorage` / `sessionStorage` DOM API. Gated so an
# `elidex-app`-profile build (which compiles `elidex-js` without `compat-webapi`)
# drops these types from the binary entirely (A2 absence guarantee). Off by
# default — Cache API / Service Worker / IndexedDB consume only the SQLite /
# origin / quota surface, never Web Storage. `elidex-js`'s `compat-webapi`
# feature turns this on.
web-storage = []

[dependencies]
rusqlite.workspace = true
tracing.workspace = true
url.workspace = true
indexmap = { version = "2.13.0", features = ["serde"] }
serde_json.workspace = true
sha2 = "0.11.0"
dirs = "6.0.0"

[dev-dependencies]
tempfile = "3"
