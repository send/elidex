[package]
name = "elidex-script-session"
description = "Script session abstraction bridging JS engines and the ECS DOM"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
readme = "README.md"
keywords = ["browser-engine", "script", "dom"]
categories = ["web-programming"]

[features]
# Gates `HostDriver::install_web_storage` (whose signature names
# `elidex_storage_core::WebStorageManager`).  Feature-gated — unlike the
# unconditional `elidex-net` / `elidex-indexeddb` install deps — because the
# Web Storage backend carries the A2 absence guarantee: an `elidex-app`-profile
# build (`elidex-js` with `engine` but not `compat-webapi`) must not compile
# `WebStorageManager` into the graph at all (see
# `elidex-storage-core/Cargo.toml`).  `elidex-js`'s `compat-webapi` feature
# turns this on, so the trait method and its `ElidexJsEngine` impl always
# appear together.
web-storage = ["dep:elidex-storage-core", "elidex-storage-core/web-storage"]

[dependencies]
elidex-plugin = { workspace = true }
elidex-css = { workspace = true }
elidex-ecs = { workspace = true }
elidex-html-parser = { workspace = true }
# Host-resource + service-worker types named by the `HostDriver` contract
# (`install_network_handle` / `install_cookie_jar` / `install_idb_backend`,
# `deliver_sw_client_update` / `seed_sw_client` / `drain_sw_client_requests`).
# Engine-independent host crates — a clean downward dep (none reach back to
# elidex-script-session, so no cycle); the contract that marshals these
# resources legitimately names their types.
elidex-api-sw = { workspace = true }
elidex-net = { workspace = true }
elidex-indexeddb = { workspace = true }
# `install_web_storage` only — optional behind the `web-storage` feature (the
# A2 absence guarantee; see the [features] comment above).
elidex-storage-core = { workspace = true, optional = true }
hecs = { workspace = true }
url = { workspace = true }

[lints]
workspace = true
