[package]
name = "elidex-js"
description = "JavaScript parser (ES2020+ strict mode, pure Rust)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
keywords = ["browser-engine", "javascript", "parser"]
categories = ["web-programming", "parsing"]

[features]
default = []
engine = [
    "elidex-script-session",
    "elidex-ecs",
    "elidex-plugin",
    "elidex-css",
    "elidex-net",
    "elidex-dom-api",
    "elidex-api-observers",
    "elidex-api-canvas",
    "elidex-web-canvas",
    "elidex-api-ws",
    "elidex-api-workers",
    "crossbeam-channel",
    "elidex-custom-elements",
    "elidex-form",
    "elidex-storage-core",
    "elidex-indexeddb",
    "elidex-cache-api",
    "elidex-api-crypto",
    "elidex-api-sw",
    "elidex-wasm-runtime",
    "bytes",
    "encoding_rs",
    "base64",
    "sha1",
    "sha2",
    "hmac",
    "getrandom",
    "uuid",
]

[dependencies]
hashbrown = "0.17"
num-bigint = "0.4"
num-traits = "0.2"
regress = { workspace = true }
unicode-ident = "1.0"
# WHATWG URL parser — consumed by the `location` / `history`
# host globals (PR5a C6).  Workspace dep; the elidex-net crate
# already owns the same entry.
url = { workspace = true }
elidex-script-session = { workspace = true, optional = true }
elidex-ecs = { workspace = true, optional = true }
elidex-css = { workspace = true, optional = true }
elidex-plugin = { workspace = true, optional = true }
# Network transport — consumed by the `fetch()` host global
# (Fetch API `Window.fetch`).  Optional + engine-gated because
# the Fetch surface itself is engine-only.
elidex-net = { workspace = true, optional = true }
# `bytes::Bytes` is the body type on `elidex_net::Request` /
# `Response`; `vm/host/fetch.rs` constructs Bytes values
# directly, so the workspace-shared crate is pulled in when
# `engine` is enabled.
bytes = { workspace = true, optional = true }
# Encoding label resolution + streaming decoder state backing
# `TextEncoder` / `TextDecoder` (WHATWG Encoding §8).  Optional +
# engine-gated because the surface depends on the engine-only
# `Uint8Array` + `ArrayBuffer` wrappers.
encoding_rs = { workspace = true, optional = true }
# Base64 encode/decode backing `FileReader.readAsDataURL` (FileAPI §6.3).
# RFC 4648 standard alphabet via `engine::general_purpose::STANDARD`.
# Workspace dep shared with `elidex-cache-api` / `elidex-js-boa`.
base64 = { workspace = true, optional = true }
# Engine-independent DOM API handler implementations dispatched via
# `DomApiHandler` from `vm::host::dom_bridge::invoke_dom_api`.  See
# CLAUDE.md "Layering mandate".
elidex-dom-api = { workspace = true, optional = true }
# Observer registries (`MutationObserverRegistry` etc.) consumed by
# the `MutationObserver` VM thin binding.  Engine-gated because the
# observer surface is engine-only.
elidex-api-observers = { workspace = true, optional = true }
# Canvas 2D component plumbing (`Canvas2dContext`-component ensure/query/
# dirty/sync + the width/height bitmap-reset `CanvasReconciler`) consumed by
# the `HTMLCanvasElement.getContext('2d')` VM binding (slot `#11-canvas-2d-vm`).
# Engine-gated because the canvas surface is engine-only.
elidex-api-canvas = { workspace = true, optional = true }
# Canvas 2D raster backend (`Canvas2dContext` + `serialize_canvas_color`) —
# the engine-independent drawing ops the host binding marshals into.
elidex-web-canvas = { workspace = true, optional = true }
# Engine-independent WebSocket / EventSource protocol types
# (`WsReadyState` / `SseReadyState` / `normalize_ws_url` /
# `validate_ws_url` / `is_mixed_content`) consumed by the WS / SSE
# VM thin bindings (slot `#11-net-ws-sse`).  Engine-gated because
# the realtime surface depends on the engine-only NetworkHandle +
# event-dispatch wiring.
elidex-api-ws = { workspace = true, optional = true }
# Dedicated Web Worker IPC types + pure validation + thread-spawn
# scaffolding (`ParentToWorker` / `WorkerToParent` / `WorkerRegistry` /
# `spawn_worker` / `validate::*`) consumed by the worker-mode VM
# construction + worker thread loop (slot `#11-web-workers-vm`).  Engine-
# gated because the worker surface depends on the engine-only DOM / fetch
# / event-dispatch wiring.
elidex-api-workers = { workspace = true, optional = true }
# `RecvTimeoutError` for the worker thread loop's `recv_timeout` (Timeout
# vs Disconnected) — the `elidex-plugin` `LocalChannel` is crossbeam-backed.
crossbeam-channel = { workspace = true, optional = true }
# Custom Elements v1 registry + reaction queue + state + validation +
# `CustomElementReactionConsumer` (WHATWG HTML §4.13) consumed by the
# VM thin binding (slot `#11-custom-elements-vm` / D-17). Engine-gated
# because the custom-elements surface depends on the engine-only DOM /
# Element wrappers / MutationDispatcher seam.
elidex-custom-elements = { workspace = true, optional = true }
# Form-control state, label association, validation, selection —
# consumed by upcoming HTMLFormElement / HTMLInputElement prototype
# bindings.  Currently dep-only.
elidex-form = { workspace = true, optional = true }
# `WebStorageManager` + `SessionStorageState` backing the WHATWG
# HTML §11.2 Storage VM thin binding (slot #11-storage-web).
# Engine-gated because the Storage surface depends on the
# engine-only Window prototype + DOMException mapping.
elidex-storage-core = { workspace = true, optional = true }
# IndexedDB backend (SQLite-backed, engine-independent record/key/index/cursor
# algorithm + W3C key encoding) consumed by the `indexedDB` / IDB* VM thin
# bindings (slot `#11-indexed-db-vm` / D-20).  host/ marshalls JsValue↔key/value
# + drives the §5.x event-loop orchestration; all record algorithm lives here.
elidex-indexeddb = { workspace = true, optional = true }
# Cache API storage backend (SQLite-backed, engine-independent
# CacheStorage / per-cache store / `CachedEntry` matching) consumed by
# the `caches` / `Cache` VM thin bindings (slot `#11-cache-api-vm` /
# D-19 PR-1).  host/cache/ marshalls JsValue to CachedEntry / Response /
# Request; all open/has/delete/keys + match/put/delete/add_all
# algorithm lives in the crate (CLAUDE.md "Layering mandate").
elidex-cache-api = { workspace = true, optional = true }
# Engine-independent Service Worker crate (IPC protocol `ContentToSw` /
# `SwToContent` / `ClientSnapshot`, SW security/scope/update algorithms)
# consumed by the SW-thread worker-mode VM (`vm/sw_thread.rs` +
# `vm/host/service_worker/`, slot `#11-service-workers-vm` / D-19 PR-2).
# The VM only marshals JsValue ↔ the crate's `Send` IPC types + drives the
# per-SW event loop; all pure SW algorithm stays in the crate.
elidex-api-sw = { workspace = true, optional = true }
# WebAssembly engine-bridge crate (wasmtime backend behind engine-indep
# `WasmRuntime` / `WasmModule` / `WasmInstance` / `WasmMemory` / `WasmTable` /
# `WasmGlobal` / `WasmFunc` / `WasmMemoryView` / `WasmError` surface) consumed
# by the `WebAssembly` namespace + 5 ctor + 3 error class VM thin binding
# (slot `#11-wasm-vm` / D-16).  Engine-gated because the WebAssembly surface
# depends on the engine-only ArrayBuffer / TypedArray / DataView wrappers +
# DOM bridge.  Per CLAUDE.md "Layering mandate" + plan-memo §4.3 trip-wires
# #1-#3, no `wasmtime::` token may appear in the elidex-js crate — the
# engine-bridge crate encapsulates wasmtime internally.
elidex-wasm-runtime = { workspace = true, optional = true }
# Engine-independent WebCrypto algorithm crate (CryptoKey lifecycle,
# §18.4 algorithm-normalize registry, HMAC sign/verify/key-gen, JWK
# parse, digest) consumed by the `SubtleCrypto` VM thin binding
# (slot `#11-crypto-subtle-full`).  Per CLAUDE.md "Layering mandate"
# the VM only marshals JsValue ↔ the crate's `&[u8]` / typed-error API
# (`ops::{import_key,generate_key,export_key,sign,verify}`); all
# algorithm + spec-validation lives in the crate.
elidex-api-crypto = { workspace = true, optional = true }
# WebCrypto §10 / §14 backing for the `Crypto` + `SubtleCrypto`
# VM thin bindings (slot `#11-crypto-subtle-min` / `-full`).
# - `sha1` / `sha2`: digest impls re-exported through `elidex-api-crypto`
#   (the crate owns `hash::digest`; elidex-js keeps the deps only for the
#   `getRandomValues` / direct-CSPRNG paths in `crypto.rs`).
# - `hmac`: HMAC `Mac` driver for `elidex-api-crypto::hmac` (digest 0.11
#   ecosystem, constant-time `verify_slice`).
# - `getrandom`: OS CSPRNG backing `Crypto.prototype.getRandomValues`,
#   `randomUUID`, and HMAC `generateKey` key material.
# - `uuid`: v4 UUID generation backing `Crypto.prototype.randomUUID`.
# All engine-gated because the WebCrypto surface depends on the
# engine-only Window + ArrayBuffer / TypedArray / DataView wrappers.
sha1 = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
hmac = { workspace = true, optional = true }
getrandom = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }

[dev-dependencies]
criterion = { workspace = true }
# Mock `NetworkHandle` for fetch tests.  Separate from the
# regular `elidex-net` dep so production builds don't pull the
# `test-hooks` feature accidentally.
elidex-net = { workspace = true, features = ["test-hooks"] }

# Event-object construction throughput (PR3.6) — measures the per-
# dispatch cost of `create_event_object` for each EventPayload variant.
# Requires the `engine` feature for `DispatchEvent` / `HostData` /
# `create_element_wrapper`.
[[bench]]
name = "event_dispatch"
harness = false
required-features = ["engine"]

# Live HTMLCollection accessor throughput (PR-spec-polish SP2) —
# measures the per-access cost of `length` / `iter` / `item` against
# a populated tree.  Input to the SP2-impl decision gate; see the
# bench's own module docstring for the cost-thresholds the gate uses.
[[bench]]
name = "dom_collection"
harness = false
required-features = ["engine"]

[lints]
workspace = true
