[package]
name = "elidex-js"
description = "JavaScript parser (ES2020+ strict mode, pure Rust)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
keywords = ["browser-engine", "javascript", "parser"]
categories = ["web-programming", "parsing"]

[features]
default = []
engine = ["elidex-script-session", "elidex-ecs"]

[dependencies]
hashbrown = "0.17"
num-bigint = "0.4"
num-traits = "0.2"
regress = { workspace = true }
unicode-ident = "1.0"
elidex-script-session = { workspace = true, optional = true }
elidex-ecs = { workspace = true, optional = true }

[lints]
workspace = true
