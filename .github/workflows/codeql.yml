name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Sunday 00:00 UTC — keeps findings fresh without blocking PRs.
    # Rust CodeQL runs ~10 min per PR on Default setup, dominating merge latency.
    - cron: "0 0 * * 0"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [actions, rust]
    steps:
      - uses: actions/checkout@v6

      # Rust CodeQL uses the source-only analyzer (build-mode: none) — it
      # does not support `autobuild`, and `none` avoids the ~10 min tracer
      # build that Default setup used to run.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
